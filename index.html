<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Grand 統計分析</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-2: #f8fafc;
      --border: #dbe4f0;
      --text: #122033;
      --muted: #5f7087;
      --blue: #1f7cff;
      --blue-soft: rgba(31, 124, 255, 0.16);
      --amber: #f59e0b;
      --green: #20a34a;
      --red: #e3342f;
      --track: #d9dee7;
      --shadow: 0 10px 28px rgba(18, 32, 51, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
      background: linear-gradient(180deg, #f9fbff 0%, #f3f6fb 100%);
      color: var(--text);
    }

    .container {
      max-width: 1380px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: -0.02em;
    }

    .subline {
      color: var(--muted);
      margin-top: 6px;
      font-size: 14px;
    }

    .btn {
      border: none;
      cursor: pointer;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #1f7cff, #21b3ff);
      border-radius: 14px;
      padding: 13px 18px;
      box-shadow: 0 8px 18px rgba(31, 124, 255, 0.22);
      white-space: nowrap;
    }

    .filter-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .filter-bar label {
      font-size: 14px;
      color: var(--muted);
      font-weight: 700;
    }

    .filter-select {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .metric-label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .metric-value {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.15;
      word-break: break-word;
    }

    .layout-2 {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 18px;
      margin-bottom: 20px;
    }

    .layout-3 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 20px;
    }

    .layout-4 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
      margin-bottom: 20px;
    }

    .section-title {
      margin: 0 0 16px;
      font-size: 21px;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .chart-box {
      height: 340px;
    }

    .balls-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .ball-stat {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px 10px;
      text-align: center;
    }

    .ball-number {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 8px;
      color: var(--blue);
    }

    .ball-count {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .analysis-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .analysis-title {
      margin: 0 0 16px;
      font-size: 18px;
      font-weight: 800;
      color: var(--blue);
      text-align: center;
      padding-bottom: 12px;
      border-bottom: 4px solid #e5eefb;
    }

    .analysis-row {
      display: grid;
      grid-template-columns: 1fr 150px 56px;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
      font-weight: 700;
      color: #4d5e74;
    }

    .bar-track {
      height: 18px;
      background: var(--track);
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
    }

    .blue { background: var(--blue); }
    .green { background: var(--green); }
    .red { background: var(--red); }

    .table-topline {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 14px;
    }

    .table-note {
      color: var(--muted);
      font-size: 13px;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid #e8eef6;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-weight: 700;
      background: #f8fbff;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .num-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .num-badge {
      min-width: 34px;
      height: 34px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--blue-soft);
      color: var(--blue);
      border: 1px solid rgba(31, 124, 255, 0.18);
      font-weight: 800;
      font-size: 13px;
    }

    .num-badge.special {
      background: rgba(245, 158, 11, 0.14);
      color: #b66a00;
      border-color: rgba(245, 158, 11, 0.24);
    }

    .table-pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 13px;
      line-height: 1;
      white-space: nowrap;
    }

    .table-pill.green {
      background: rgba(32, 163, 74, 0.14);
      color: #17833a;
    }

    .table-pill.red {
      background: rgba(227, 52, 47, 0.14);
      color: #c92d28;
    }

    .table-pill.blue {
      background: rgba(31, 124, 255, 0.12);
      color: #1f7cff;
    }

    @media (max-width: 1200px) {
      .layout-4 { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 1024px) {
      .metrics { grid-template-columns: repeat(2, 1fr); }
      .layout-2, .layout-3 { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      .container { padding: 14px; }
      .header { flex-direction: column; align-items: stretch; }
      .filter-bar { justify-content: flex-start; flex-wrap: wrap; }
      .metrics { grid-template-columns: 1fr; }
      .layout-4 { grid-template-columns: 1fr; }
      .balls-grid { grid-template-columns: repeat(3, 1fr); }
      .analysis-row { grid-template-columns: 1fr 120px 52px; }
      h1 { font-size: 28px; }
      .metric-value { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>Daily Grand 統計分析</h1>
        <div class="subline" id="historySummary">載入中…</div>
      </div>
      <button id="reloadBtn" class="btn">重新載入資料</button>
    </div>

    <div class="filter-bar">
      <label for="drawLimitInput">統計期數：</label>
      <input
        id="drawLimitInput"
        class="filter-select"
        type="number"
        min="1"
        step="1"
        placeholder="全部"
        style="width:120px;"
      />
    </div>

    <div class="metrics">
      <div class="card">
        <div class="metric-label">統計期數</div>
        <div class="metric-value" id="totalDraws">-</div>
      </div>
      <div class="card">
        <div class="metric-label">最近一期日期</div>
        <div class="metric-value" id="latestDate">-</div>
      </div>
      <div class="card">
        <div class="metric-label">最常見主號碼</div>
        <div class="metric-value" id="topMain">-</div>
      </div>
      <div class="card">
        <div class="metric-label">最常見特別號碼</div>
        <div class="metric-value" id="topSpecial">-</div>
      </div>
    </div>

    <div class="layout-2">
      <div class="card">
        <h2 class="section-title">主號碼出現次數（1-49）</h2>
        <div class="chart-box"><canvas id="mainChart"></canvas></div>
      </div>
      <div class="card">
        <h2 class="section-title">特別號碼出現次數（1-7）</h2>
        <div class="chart-box"><canvas id="specialChart"></canvas></div>
      </div>
    </div>

    <div class="layout-3">
      <div class="card">
        <h2 class="section-title">最熱主號碼 Top 5</h2>
        <div class="balls-grid" id="hotMainNumbers"></div>
      </div>
      <div class="card">
        <h2 class="section-title">最冷主號碼 Top 5</h2>
        <div class="balls-grid" id="coldMainNumbers"></div>
      </div>
    </div>

    <div class="card" style="margin-bottom: 20px;">
      <h2 class="section-title">連續 15 期或以上未開號碼</h2>
      <div class="balls-grid" id="missingLongGrid"></div>
    </div>

    <div class="layout-4">
      <div class="analysis-card">
        <h2 class="analysis-title">單雙分布 (Top 4)</h2>
        <div id="oddEvenDist"></div>
      </div>

      <div class="analysis-card">
        <h2 class="analysis-title">連續號碼數量</h2>
        <div id="consecutiveDist"></div>
      </div>

      <div class="analysis-card">
        <h2 class="analysis-title">上期重複</h2>
        <div id="repeatDist"></div>
      </div>

      <div class="analysis-card">
        <h2 class="analysis-title">涵蓋分區</h2>
        <div id="zoneDist"></div>
      </div>
    </div>

    <div class="card">
      <div class="table-topline">
        <h2 class="section-title" style="margin-bottom:0;">最近開獎記錄</h2>
        <div class="table-note" id="tableNote">顯示全部期數</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>日期</th>
              <th>號碼</th>
              <th>單雙</th>
              <th>連續號碼</th>
              <th>上期重複</th>
              <th>分區</th>
            </tr>
          </thead>
          <tbody id="resultsTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let allRows = [];
    let mainChartInstance = null;
    let specialChartInstance = null;

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      if (Number.isNaN(d.getTime())) return dateStr;
      return d.toLocaleDateString("en-CA");
    }

    function countMainFrequencies(rows) {
      const freq = {};
      for (let i = 1; i <= 49; i++) freq[i] = 0;
      rows.forEach(r => r.numbers.forEach(n => {
        if (freq[n] !== undefined) freq[n] += 1;
      }));
      return freq;
    }

    function countSpecialFrequencies(rows) {
      const freq = {};
      for (let i = 1; i <= 7; i++) freq[i] = 0;
      rows.forEach(r => {
        if (freq[r.special] !== undefined) freq[r.special] += 1;
      });
      return freq;
    }

    function getTopEntry(freq) {
      return Object.entries(freq).sort((a, b) => b[1] - a[1] || Number(a[0]) - Number(b[0]))[0];
    }

    function getFilteredRowsByLimit(rows) {
      const rawValue = document.getElementById("drawLimitInput")?.value?.trim() || "";
      if (!rawValue) return rows;

      const limit = parseInt(rawValue, 10);
      if (isNaN(limit) || limit <= 0) return rows;

      return rows.slice(0, limit);
    }

    function renderMetrics(rows, mainFreq, specialFreq, allRowsFull) {
      document.getElementById("totalDraws").textContent = rows.length;
      document.getElementById("latestDate").textContent = rows[0] ? formatDate(rows[0].date) : "-";

      const topMain = getTopEntry(mainFreq);
      const topSpecial = getTopEntry(specialFreq);

      document.getElementById("topMain").textContent = topMain ? `${topMain[0]} (${topMain[1]}次)` : "-";
      document.getElementById("topSpecial").textContent = topSpecial ? `${topSpecial[0]} (${topSpecial[1]}次)` : "-";

      const oldest = allRowsFull[allRowsFull.length - 1];
      const rawValue = document.getElementById("drawLimitInput")?.value?.trim() || "";
      const scopeText = rawValue ? `最近 ${rows.length} 期` : "全部期數";

      document.getElementById("historySummary").textContent = oldest
        ? `目前統計範圍：${scopeText} · 全庫日期由 ${formatDate(oldest.date)} 至 ${formatDate(allRowsFull[0].date)}`
        : "";
    }

    function renderChart(canvasId, currentInstance, labels, data, label, colorA, colorB) {
      if (currentInstance) currentInstance.destroy();
      return new Chart(document.getElementById(canvasId), {
        type: "bar",
        data: {
          labels,
          datasets: [{
            label,
            data,
            backgroundColor: colorA,
            borderColor: colorB,
            borderWidth: 1,
            borderRadius: 8,
            barPercentage: 0.78,
            categoryPercentage: 0.84
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { labels: { color: "#42546b", font: { weight: 700 } } }
          },
          scales: {
            x: {
              ticks: { color: "#607289" },
              grid: { color: "rgba(18, 32, 51, 0.05)" }
            },
            y: {
              beginAtZero: true,
              ticks: { color: "#607289" },
              grid: { color: "rgba(18, 32, 51, 0.05)" }
            }
          }
        }
      });
    }

    function renderHotCold(mainFreq) {
      const entries = Object.entries(mainFreq).map(([num, count]) => ({ num: Number(num), count }));

      const hot = [...entries]
        .sort((a, b) => b.count - a.count || a.num - b.num)
        .slice(0, 5);

      const cold = [...entries]
        .sort((a, b) => a.count - b.count || a.num - b.num)
        .slice(0, 5);

      document.getElementById("hotMainNumbers").innerHTML = hot.map(item => `
        <div class="ball-stat">
          <div class="ball-number">${item.num}</div>
          <div class="ball-count">${item.count} 次</div>
        </div>
      `).join("");

      document.getElementById("coldMainNumbers").innerHTML = cold.map(item => `
        <div class="ball-stat">
          <div class="ball-number">${item.num}</div>
          <div class="ball-count">${item.count} 次</div>
        </div>
      `).join("");
    }

    function calculateMissingStreak(rows) {
      const result = [];

      for (let num = 1; num <= 49; num++) {
        let missing = 0;
        let found = false;

        for (let i = 0; i < rows.length; i++) {
          if (rows[i].numbers.includes(num)) {
            found = true;
            break;
          }
          missing += 1;
        }

        result.push({
          num,
          skip: found ? missing : rows.length
        });
      }

      return result;
    }

    function renderMissingLong(rows) {
      const data = calculateMissingStreak(rows)
        .filter(item => item.skip >= 15)
        .sort((a, b) => b.skip - a.skip || a.num - b.num);

      const el = document.getElementById("missingLongGrid");

      if (!data.length) {
        el.innerHTML = `<div style="color:#5f7087;font-weight:700;">目前冇主號碼連續 15 期或以上未開。</div>`;
        return;
      }

      el.innerHTML = data.map(item => `
        <div class="ball-stat">
          <div class="ball-number">${item.num}</div>
          <div class="ball-count">已連續 ${item.skip} 期未開</div>
        </div>
      `).join("");
    }

    function getOddEvenPattern(numbers) {
      const odd = numbers.filter(n => n % 2 !== 0).length;
      const even = 5 - odd;
      return `${odd}單 ${even}雙`;
    }

    function getConsecutiveCount(numbers) {
      const sorted = [...numbers].sort((a, b) => a - b);
      let count = 0;
      for (let i = 1; i < sorted.length; i++) {
        if (sorted[i] === sorted[i - 1] + 1) count += 1;
      }
      return count;
    }

    function getRepeatCount(current, previous) {
      if (!previous) return null;
      const prevSet = new Set(previous.numbers);
      return current.numbers.filter(n => prevSet.has(n)).length;
    }

    function getZoneCount(numbers) {
      const zones = new Set();
      numbers.forEach(n => {
        if (n >= 1 && n <= 10) zones.add(1);
        else if (n <= 20) zones.add(2);
        else if (n <= 30) zones.add(3);
        else if (n <= 40) zones.add(4);
        else zones.add(5);
      });
      return zones.size;
    }

    function countDistribution(items) {
      const map = {};
      items.forEach(v => { map[v] = (map[v] || 0) + 1; });
      return map;
    }

    function percent(count, total) {
      return total ? Math.round((count / total) * 100) : 0;
    }

    function renderProgressRows(containerId, items, colorClass = "blue") {
      const container = document.getElementById(containerId);
      container.innerHTML = items.map(item => `
        <div class="analysis-row">
          <div>${item.label}</div>
          <div class="bar-track">
            <div class="bar-fill ${item.color || colorClass}" style="width:${item.pct}%"></div>
          </div>
          <div>${item.pct}%</div>
        </div>
      `).join("");
    }

    function renderAdvancedAnalysis(rows) {
      const total = rows.length;

      const oddEvenMap = countDistribution(rows.map(r => getOddEvenPattern(r.numbers)));
      const oddEvenItems = ["4單 1雙", "3單 2雙", "2單 3雙", "1單 4雙", "5單 0雙", "0單 5雙"]
        .filter(label => oddEvenMap[label])
        .sort((a, b) => oddEvenMap[b] - oddEvenMap[a])
        .slice(0, 4)
        .map(label => ({
          label,
          pct: percent(oddEvenMap[label], total),
          color: "blue"
        }));
      renderProgressRows("oddEvenDist", oddEvenItems, "blue");

      const consecutiveMap = countDistribution(rows.map(r => getConsecutiveCount(r.numbers)));
      const consecutiveItems = [0, 1, 2, 3, 4].map(n => ({
        label: `${n}個連續`,
        pct: percent(consecutiveMap[n] || 0, total),
        color: n === 0 ? "red" : "green"
      }));
      renderProgressRows("consecutiveDist", consecutiveItems);

      const repeatValues = [];
      for (let i = 0; i < rows.length; i++) {
        const repeat = getRepeatCount(rows[i], rows[i + 1]);
        if (repeat !== null) repeatValues.push(repeat);
      }
      const repeatMap = countDistribution(repeatValues);
      const repeatTotal = repeatValues.length;
      const repeatItems = [
        { label: "0個", key: 0 },
        { label: "1個", key: 1 },
        { label: "2個", key: 2 },
        { label: "3個或以上", key: "3plus" }
      ].map(item => {
        const count = item.key === "3plus"
          ? (repeatMap[3] || 0) + (repeatMap[4] || 0) + (repeatMap[5] || 0)
          : (repeatMap[item.key] || 0);
        return {
          label: item.label,
          pct: percent(count, repeatTotal),
          color: "blue"
        };
      });
      renderProgressRows("repeatDist", repeatItems, "blue");

      const zoneMap = countDistribution(rows.map(r => getZoneCount(r.numbers)));
      const zoneItems = [5, 4, 3, 2, 1]
        .filter(z => zoneMap[z] !== undefined)
        .map(z => ({
          label: `${z}個區`,
          pct: percent(zoneMap[z], total),
          color: "blue"
        }));
      renderProgressRows("zoneDist", zoneItems, "blue");
    }

    function renderTable(rows) {
      const visibleRows = rows;
      document.getElementById("tableNote").textContent = `顯示全部 ${rows.length} 期`;

      document.getElementById("resultsTableBody").innerHTML = visibleRows.map((r, index) => {
        const previous = visibleRows[index + 1] || null;
        const oddEven = getOddEvenPattern(r.numbers);

        const consecutiveCount = getConsecutiveCount(r.numbers);
        const consecutive = `<span class="table-pill ${consecutiveCount === 0 ? "red" : "green"}">${consecutiveCount}個連續</span>`;

        const repeatCount = getRepeatCount(r, previous);
        const repeatLabel = repeatCount === null
          ? "-"
          : `<span class="table-pill ${repeatCount === 0 ? "red" : "blue"}">${repeatCount}個</span>`;

        const zoneLabel = `<span class="table-pill blue">${getZoneCount(r.numbers)}個區</span>`;

        return `
          <tr>
            <td>${formatDate(r.date)}</td>
            <td>
              <div class="num-row">
                ${r.numbers.map(n => `<span class="num-badge">${n}</span>`).join("")}
                <span class="num-badge special">${r.special}</span>
              </div>
            </td>
            <td>${oddEven}</td>
            <td>${consecutive}</td>
            <td>${repeatLabel}</td>
            <td>${zoneLabel}</td>
          </tr>
        `;
      }).join("");
    }

    function renderDashboard(rows) {
      const chartRows = getFilteredRowsByLimit(rows);

      const mainFreq = countMainFrequencies(chartRows);
      const specialFreq = countSpecialFrequencies(chartRows);

      renderMetrics(chartRows, mainFreq, specialFreq, rows);
      renderHotCold(mainFreq);
      renderMissingLong(chartRows);
      renderAdvancedAnalysis(chartRows);
      renderTable(rows);

      mainChartInstance = renderChart(
        "mainChart",
        mainChartInstance,
        Object.keys(mainFreq),
        Object.values(mainFreq),
        "主號碼次數",
        "rgba(31, 124, 255, 0.72)",
        "rgba(31, 124, 255, 1)"
      );

      specialChartInstance = renderChart(
        "specialChart",
        specialChartInstance,
        Object.keys(specialFreq),
        Object.values(specialFreq),
        "特別號碼次數",
        "rgba(245, 158, 11, 0.78)",
        "rgba(245, 158, 11, 1)"
      );
    }

    async function loadData() {
      try {
        const res = await fetch("./data/daily_grand_results.json?ts=" + Date.now());
        if (!res.ok) throw new Error("Cannot load JSON");

        const rows = await res.json();

        allRows = rows
          .filter(r =>
            r &&
            r.date &&
            Array.isArray(r.numbers) &&
            r.numbers.length === 5 &&
            Number.isInteger(r.special)
          )
          .sort((a, b) => new Date(b.date) - new Date(a.date));

        if (!allRows.length) {
          alert("搵唔到有效資料，請檢查 data/daily_grand_results.json");
          return;
        }

        renderDashboard(allRows);
      } catch (err) {
        console.error(err);
        alert("載入資料失敗。請確認 repo 已經有 data/daily_grand_results.json");
      }
    }

    document.getElementById("reloadBtn").addEventListener("click", loadData);
    document.getElementById("drawLimitInput").addEventListener("input", () => {
      if (allRows.length) renderDashboard(allRows);
    });

    loadData();
  </script>
</body>
</html>
