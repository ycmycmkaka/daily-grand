name: Update Daily Grand Data

on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * 2,5"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest Daily Grand data
        run: node scripts/fetch-daily-grand.mjs

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/daily_grand_results.json
          git diff --cached --quiet || git commit -m "Update Daily Grand data"
          git push
