<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Grand 統計分析</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #07111f;
      --panel: #0f172a;
      --panel-2: #111827;
      --line: #243244;
      --text: #e5eefb;
      --muted: #93a4bd;
      --blue: #38bdf8;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --graybar: #d1d5db;
      --card-light: #f8fafc;
      --card-light-border: #d9e2ef;
      --card-light-title: #1677ff;
      --card-light-text: #4b5563;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
      background: linear-gradient(180deg, #020617, #0b1324 45%, #07111f);
      color: var(--text);
    }

    .container {
      max-width: 1360px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 32px;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
    }

    .btn {
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #0ea5e9, #22c55e);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 22px;
    }

    .card {
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.20);
    }

    .metric-label {
      color: var(--muted);
      font-size: 13px;
    }

    .metric-value {
      margin-top: 8px;
      font-size: 30px;
      font-weight: 800;
    }

    .layout-2 {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 18px;
      margin-bottom: 22px;
    }

    .layout-3 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 22px;
    }

    .layout-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin-bottom: 22px;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .chart-box {
      height: 320px;
    }

    .balls-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .ball-stat {
      background: var(--panel-2);
      border: 1px solid #2f4057;
      border-radius: 14px;
      padding: 12px;
      text-align: center;
    }

    .ball-number {
      font-size: 18px;
      font-weight: 800;
    }

    .ball-count {
      color: #93c5fd;
      font-size: 13px;
      margin-top: 4px;
    }

    .analysis-card {
      background: #f3f6fb;
      border: 1px solid var(--card-light-border);
      border-radius: 18px;
      padding: 18px 18px 14px;
      color: #111827;
    }

    .analysis-title {
      margin: 0 0 16px;
      font-size: 18px;
      font-weight: 800;
      color: var(--card-light-title);
      text-align: center;
      padding-bottom: 10px;
      border-bottom: 4px solid #d8e5f7;
    }

    .analysis-row {
      display: grid;
      grid-template-columns: 1fr 150px 64px;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      font-weight: 700;
      color: var(--card-light-text);
    }

    .bar-track {
      height: 18px;
      background: #d9dde3;
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
    }

    .blue { background: #1677ff; }
    .green { background: #1f9a3c; }
    .red { background: #e43122; }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px 10px;
      text-align: left;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-weight: 600;
    }

    .num-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .num-badge {
      min-width: 34px;
      height: 34px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(56, 189, 248, 0.9);
      color: #fff;
      font-weight: 700;
      font-size: 13px;
    }

    .num-badge.special {
      background: rgba(245, 158, 11, 0.95);
      color: #111827;
    }

    @media (max-width: 1200px) {
      .layout-4 { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 1024px) {
      .metrics { grid-template-columns: repeat(2, 1fr); }
      .layout-2, .layout-3 { grid-template-columns: 1fr; }
    }

    @media (max-width: 680px) {
      .container { padding: 14px; }
      .metrics { grid-template-columns: 1fr; }
      .layout-4 { grid-template-columns: 1fr; }
      .balls-grid { grid-template-columns: repeat(3, 1fr); }
      .analysis-row { grid-template-columns: 1fr 120px 54px; }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Daily Grand 統計分析</h1>

    <div class="topbar">
      <button id="reloadBtn" class="btn">重新載入資料</button>
    </div>

    <div class="metrics">
      <div class="card">
        <div class="metric-label">總期數</div>
        <div class="metric-value" id="totalDraws">-</div>
      </div>
      <div class="card">
        <div class="metric-label">最近一期日期</div>
        <div class="metric-value" id="latestDate">-</div>
      </div>
      <div class="card">
        <div class="metric-label">最常見主號碼</div>
        <div class="metric-value" id="topMain">-</div>
      </div>
      <div class="card">
        <div class="metric-label">最常見特別號碼</div>
        <div class="metric-value" id="topSpecial">-</div>
      </div>
    </div>

    <div class="layout-2">
      <div class="card">
        <h2 class="section-title">主號碼出現次數（1-49）</h2>
        <div class="chart-box"><canvas id="mainChart"></canvas></div>
      </div>
      <div class="card">
        <h2 class="section-title">特別號碼出現次數（1-7）</h2>
        <div class="chart-box"><canvas id="specialChart"></canvas></div>
      </div>
    </div>

    <div class="layout-3">
      <div class="card">
        <h2 class="section-title">最熱主號碼 Top 5</h2>
        <div class="balls-grid" id="hotMainNumbers"></div>
      </div>
      <div class="card">
        <h2 class="section-title">最冷主號碼 Top 5</h2>
        <div class="balls-grid" id="coldMainNumbers"></div>
      </div>
    </div>

    <div class="layout-4">
      <div class="analysis-card">
        <h2 class="analysis-title">單雙分布 (Top 4)</h2>
        <div id="oddEvenDist"></div>
      </div>

      <div class="analysis-card">
        <h2 class="analysis-title">連續號碼數量</h2>
        <div id="consecutiveDist"></div>
      </div>

      <div class="analysis-card">
        <h2 class="analysis-title">上期重複</h2>
        <div id="repeatDist"></div>
      </div>

      <div class="analysis-card">
        <h2 class="analysis-title">涵蓋分區</h2>
        <div id="zoneDist"></div>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">最近開獎記錄</h2>
      <div style="overflow:auto;">
        <table>
          <thead>
            <tr>
              <th>日期</th>
              <th>號碼</th>
            </tr>
          </thead>
          <tbody id="resultsTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let allRows = [];
    let mainChartInstance = null;
    let specialChartInstance = null;

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      if (Number.isNaN(d.getTime())) return dateStr;
      return d.toLocaleDateString("en-CA");
    }

    function countMainFrequencies(rows) {
      const freq = {};
      for (let i = 1; i <= 49; i++) freq[i] = 0;
      rows.forEach(r => r.numbers.forEach(n => {
        if (freq[n] !== undefined) freq[n] += 1;
      }));
      return freq;
    }

    function countSpecialFrequencies(rows) {
      const freq = {};
      for (let i = 1; i <= 7; i++) freq[i] = 0;
      rows.forEach(r => {
        if (freq[r.special] !== undefined) freq[r.special] += 1;
      });
      return freq;
    }

    function getTopEntry(freq) {
      return Object.entries(freq).sort((a, b) => b[1] - a[1] || Number(a[0]) - Number(b[0]))[0];
    }

    function renderMetrics(rows, mainFreq, specialFreq) {
      document.getElementById("totalDraws").textContent = rows.length;
      document.getElementById("latestDate").textContent = rows[0] ? formatDate(rows[0].date) : "-";

      const topMain = getTopEntry(mainFreq);
      const topSpecial = getTopEntry(specialFreq);

      document.getElementById("topMain").textContent = topMain ? `${topMain[0]} (${topMain[1]}次)` : "-";
      document.getElementById("topSpecial").textContent = topSpecial ? `${topSpecial[0]} (${topSpecial[1]}次)` : "-";
    }

    function renderChart(canvasId, currentInstance, labels, data, label, colorA, colorB) {
      if (currentInstance) currentInstance.destroy();
      return new Chart(document.getElementById(canvasId), {
        type: "bar",
        data: {
          labels,
          datasets: [{
            label,
            data,
            backgroundColor: colorA,
            borderColor: colorB,
            borderWidth: 1,
            borderRadius: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { labels: { color: "#dbeafe" } }
          },
          scales: {
            x: {
              ticks: { color: "#cbd5e1" },
              grid: { color: "rgba(255,255,255,0.05)" }
            },
            y: {
              beginAtZero: true,
              ticks: { color: "#cbd5e1" },
              grid: { color: "rgba(255,255,255,0.05)" }
            }
          }
        }
      });
    }

    function renderHotCold(mainFreq) {
      const entries = Object.entries(mainFreq).map(([num, count]) => ({ num: Number(num), count }));

      const hot = [...entries]
        .sort((a, b) => b.count - a.count || a.num - b.num)
        .slice(0, 5);

      const cold = [...entries]
        .sort((a, b) => a.count - b.count || a.num - b.num)
        .slice(0, 5);

      document.getElementById("hotMainNumbers").innerHTML = hot.map(item => `
        <div class="ball-stat">
          <div class="ball-number">${item.num}</div>
          <div class="ball-count">${item.count} 次</div>
        </div>
      `).join("");

      document.getElementById("coldMainNumbers").innerHTML = cold.map(item => `
        <div class="ball-stat">
          <div class="ball-number">${item.num}</div>
          <div class="ball-count">${item.count} 次</div>
        </div>
      `).join("");
    }

    function getOddEvenPattern(numbers) {
      const odd = numbers.filter(n => n % 2 !== 0).length;
      const even = 5 - odd;
      return `${odd}單 ${even}雙`;
    }

    function getConsecutiveCount(numbers) {
      const sorted = [...numbers].sort((a, b) => a - b);
      let count = 0;
      for (let i = 1; i < sorted.length; i++) {
        if (sorted[i] === sorted[i - 1] + 1) count += 1;
      }
      return count;
    }

    function getRepeatCount(current, previous) {
      if (!previous) return null;
      const prevSet = new Set(previous.numbers);
      return current.numbers.filter(n => prevSet.has(n)).length;
    }

    function getZoneCount(numbers) {
      const zones = new Set();
      numbers.forEach(n => {
        if (n >= 1 && n <= 10) zones.add(1);
        else if (n <= 20) zones.add(2);
        else if (n <= 30) zones.add(3);
        else if (n <= 40) zones.add(4);
        else zones.add(5);
      });
      return zones.size;
    }

    function countDistribution(items) {
      const map = {};
      items.forEach(v => {
        map[v] = (map[v] || 0) + 1;
      });
      return map;
    }

    function percent(count, total) {
      return total ? Math.round((count / total) * 100) : 0;
    }

    function renderProgressRows(containerId, items, colorClass = "blue") {
      const container = document.getElementById(containerId);
      container.innerHTML = items.map(item => `
        <div class="analysis-row">
          <div>${item.label}</div>
          <div class="bar-track">
            <div class="bar-fill ${item.color || colorClass}" style="width:${item.pct}%"></div>
          </div>
          <div>${item.pct}%</div>
        </div>
      `).join("");
    }

    function renderAdvancedAnalysis(rows) {
      const total = rows.length;

      const oddEvenMap = countDistribution(rows.map(r => getOddEvenPattern(r.numbers)));
      const oddEvenItems = ["4單 1雙", "3單 2雙", "2單 3雙", "1單 4雙", "5單 0雙", "0單 5雙"]
        .filter(label => oddEvenMap[label])
        .sort((a, b) => oddEvenMap[b] - oddEvenMap[a])
        .slice(0, 4)
        .map(label => ({
          label,
          pct: percent(oddEvenMap[label], total),
          color: "blue"
        }));
      renderProgressRows("oddEvenDist", oddEvenItems, "blue");

      const consecutiveMap = countDistribution(rows.map(r => getConsecutiveCount(r.numbers)));
      const consecutiveItems = [1, 0, 2, 3, 4]
        .map(n => ({
          label: `${n}個連續`,
          pct: percent(consecutiveMap[n] || 0, total),
          color: n === 1 || n === 2 ? "green" : (n === 0 ? "red" : "green")
        }));
      renderProgressRows("consecutiveDist", consecutiveItems);

      const repeatValues = [];
      for (let i = 0; i < rows.length; i++) {
        const repeat = getRepeatCount(rows[i], rows[i + 1]);
        if (repeat !== null) repeatValues.push(repeat);
      }
      const repeatMap = countDistribution(repeatValues);
      const repeatTotal = repeatValues.length;
      const repeatItems = [
        { label: "1個", key: 1 },
        { label: "0個", key: 0 },
        { label: "2個", key: 2 },
        { label: "3個或以上", key: "3plus" }
      ].map(item => {
        const count = item.key === "3plus"
          ? (repeatMap[3] || 0) + (repeatMap[4] || 0) + (repeatMap[5] || 0)
          : (repeatMap[item.key] || 0);

        return {
          label: item.label,
          pct: percent(count, repeatTotal),
          color: "blue"
        };
      });
      renderProgressRows("repeatDist", repeatItems, "blue");

      const zoneMap = countDistribution(rows.map(r => getZoneCount(r.numbers)));
      const zoneItems = [4, 5, 3, 2, 1]
        .filter(z => zoneMap[z])
        .map(z => ({
          label: `${z}個區`,
          pct: percent(zoneMap[z], total),
          color: "blue"
        }));
      renderProgressRows("zoneDist", zoneItems, "blue");
    }

    function renderTable(rows) {
      document.getElementById("resultsTableBody").innerHTML = rows.slice(0, 40).map(r => `
        <tr>
          <td>${formatDate(r.date)}</td>
          <td>
            <div class="num-row">
              ${r.numbers.map(n => `<span class="num-badge">${n}</span>`).join("")}
              <span class="num-badge special">S ${r.special}</span>
            </div>
          </td>
        </tr>
      `).join("");
    }

    function renderDashboard(rows) {
      const mainFreq = countMainFrequencies(rows);
      const specialFreq = countSpecialFrequencies(rows);

      renderMetrics(rows, mainFreq, specialFreq);
      renderHotCold(mainFreq);
      renderAdvancedAnalysis(rows);
      renderTable(rows);

      mainChartInstance = renderChart(
        "mainChart",
        mainChartInstance,
        Object.keys(mainFreq),
        Object.values(mainFreq),
        "主號碼次數",
        "rgba(56, 189, 248, 0.70)",
        "rgba(56, 189, 248, 1)"
      );

      specialChartInstance = renderChart(
        "specialChart",
        specialChartInstance,
        Object.keys(specialFreq),
        Object.values(specialFreq),
        "特別號碼次數",
        "rgba(245, 158, 11, 0.75)",
        "rgba(245, 158, 11, 1)"
      );
    }

    async function loadData() {
      try {
        const res = await fetch("./data/daily_grand_results.json?ts=" + Date.now());
        if (!res.ok) throw new Error("Cannot load JSON");

        const rows = await res.json();

        allRows = rows
          .filter(r =>
            r &&
            r.date &&
            Array.isArray(r.numbers) &&
            r.numbers.length === 5 &&
            Number.isInteger(r.special)
          )
          .sort((a, b) => new Date(b.date) - new Date(a.date));

        if (!allRows.length) {
          alert("搵唔到有效資料，請檢查 data/daily_grand_results.json");
          return;
        }

        renderDashboard(allRows);
      } catch (err) {
        console.error(err);
        alert("載入資料失敗。請確認 repo 已經有 data/daily_grand_results.json");
      }
    }

    document.getElementById("reloadBtn").addEventListener("click", loadData);

    loadData();
  </script>
</body>
</html>
